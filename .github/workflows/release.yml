name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"

jobs:
  verify:
    name: Verify release source
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out complete source history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Require a release commit from the default branch
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -Eeuo pipefail
          git merge-base --is-ancestor "$GITHUB_SHA" "origin/$DEFAULT_BRANCH" || {
            echo "Release tag must point to a commit on $DEFAULT_BRANCH" >&2
            exit 1
          }

      - name: Verify tag and package version
        run: |
          set -Eeuo pipefail
          [[ "$GITHUB_REF_NAME" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z.-]+)?$ ]]
          package_version="$(cargo metadata --no-deps --format-version 1 --locked | jq -r '.packages[0].version')"
          test "v$package_version" = "$GITHUB_REF_NAME"

      - name: Install pinned Rust toolchain
        run: rustup show active-toolchain

      - name: Verify source
        run: |
          cargo fmt --check
          cargo clippy --all-targets --all-features --locked -- -D warnings
          cargo test --all-targets --all-features --locked

      - name: Verify shell and dependencies
        run: |
          find . -type f -name '*.sh' -not -path './target/*' -print0 | xargs -0 shellcheck
          cargo install cargo-audit --locked --version 0.22.2
          cargo audit --deny warnings

  build:
    name: Build ${{ matrix.target }}
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      contents: read
      id-token: write
      attestations: write
      artifact-metadata: write
    container: ${{ matrix.container }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-unknown-linux-musl
            container: ghcr.io/rust-cross/rust-musl-cross:aarch64-musl@sha256:ecae5dd62d1c938c14f8071d36c16fa699860aace03bfb5284fb1216474d2643
          - target: x86_64-unknown-linux-musl
            container: ghcr.io/rust-cross/rust-musl-cross:x86_64-musl@sha256:ce75e9174325d4fbb3de85c309e2d7ca29f7500169bc4b5d2c611ff7e86d549a

    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install pinned target toolchain
        run: |
          rustup show active-toolchain
          rustup target add "${{ matrix.target }}"

      - name: Build static binaries
        run: cargo build --release --locked --target "${{ matrix.target }}"

      - name: Package and verify release archive
        run: |
          scripts/release/package.sh "${{ matrix.target }}" "$GITHUB_REF_NAME" dist
          scripts/release/verify-archive.sh \
            "dist/fcr-gate-${{ matrix.target }}.tar.gz" \
            "${{ matrix.target }}" \
            "$GITHUB_REF_NAME"

      - name: Attest release archive provenance
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: dist/fcr-gate-${{ matrix.target }}.tar.gz

      - name: Upload release archive
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error
          compression-level: 0
          retention-days: 7

  publish:
    name: Publish verified GitHub Release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write

    steps:
      - name: Check out installer source
        uses: actions/checkout@9c091bb21b7c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Download verified archives
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Assemble and verify release assets
        run: scripts/release/assemble.sh "$GITHUB_REF_NAME" dist

      - name: Attest installer and checksum manifest
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: |
            dist/install-fcr-gate.sh
            dist/SHA256SUMS

      - name: Publish release atomically
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: scripts/release/publish.sh "$TAG" "$REPOSITORY" dist
